<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成語煉金術：全平台適配版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00; --bronze: #cd7f32; --iron: #3d3d3d;
            --steam-blue: #00d4ff; --danger: #ff4444; --brass: #b87333;
        }

        body {
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at center, rgba(184, 115, 51, 0.2) 0%, transparent 80%),
                              url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #e0e0e0; margin: 0; font-family: 'Noto Serif TC', serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* 主容器：由固定寬度改為響應式 */
        #main-container {
            width: 95%; max-width: 920px; min-height: 90vh;
            background: #1a1510; border: 6px double var(--bronze);
            padding: 20px; position: relative; border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(205, 127, 50, 0.1);
            display: flex; flex-direction: column; justify-content: center;
            margin: 10px auto; box-sizing: border-box;
        }

        /* 全螢幕切換按鈕 */
        #fullscreen-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(184, 115, 51, 0.3); border: 1px solid var(--bronze);
            color: var(--gold); padding: 5px 10px; cursor: pointer; z-index: 100;
            font-size: 0.8rem; border-radius: 5px; font-family: 'Special Elite';
        }

        h1 {
            font-family: 'Special Elite', system-ui; font-size: clamp(2rem, 8vw, 3.5rem);
            color: var(--gold); text-align: center; margin: 10px 0; letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        /* 虛擬鍵盤響應式 */
        .keyboard { 
            display: grid; grid-template-columns: repeat(10, 1fr); 
            gap: 4px; margin: 10px auto; width: 100%; max-width: 700px; 
        }
        .key {
            background: linear-gradient(145deg, #443322, #221a10);
            border: 1px solid var(--bronze); color: var(--gold);
            padding: clamp(8px, 2vw, 15px) 0; cursor: pointer; font-family: 'Special Elite';
            font-weight: bold; font-size: clamp(0.9rem, 3vw, 1.2rem); text-align: center;
            user-select: none; touch-action: manipulation;
        }
        .key.wide { grid-column: span 2; background: #5a221a; color: #fff; }

        /* 難度按鈕適配 */
        .diff-btn {
            flex: 1; background: #2b231a; border: 2px solid var(--iron); color: #888;
            padding: 10px 5px; cursor: pointer; font-family: 'Special Elite';
            font-weight: bold; font-size: 0.9rem; transition: 0.3s; min-width: 60px;
        }
        .diff-btn.active { border-color: var(--gold); background: var(--bronze); color: white; }

        /* 排行榜視覺 */
        .rank-container {
            background: rgba(0, 0, 0, 0.6); border: 2px solid var(--bronze);
            padding: 10px; margin-top: 15px; border-radius: 8px; font-size: 0.9rem;
        }
        .rank-title { text-align: center; color: var(--gold); font-size: 1rem; margin-bottom: 5px; border-bottom: 1px solid var(--iron); }
        .rank-item { display: flex; justify-content: space-between; padding: 4px 10px; font-family: 'Special Elite'; }
        .rank-time { color: var(--steam-blue); }

        /* 遊戲碎片：在小螢幕自動調整大小 */
        .chip {
            background: linear-gradient(135deg, #4b3621, #2b1d0e);
            border: 2px solid var(--bronze); color: var(--gold);
            padding: clamp(10px, 3vw, 15px) clamp(15px, 4vw, 25px);
            font-size: clamp(1.1rem, 4vw, 1.5rem); cursor: grab;
            border-radius: 3px; box-shadow: 3px 3px 0px #000;
            user-select: none; touch-action: none; margin: 5px;
        }

        .btn-action {
            width: 100%; background: linear-gradient(var(--bronze), var(--brass));
            border: none; border-bottom: 5px solid #5a3e1a; color: white;
            font-size: clamp(1.2rem, 5vw, 1.8rem); padding: 15px; cursor: pointer; font-weight: bold;
        }

        .btn-back {
            background: #5a221a; border: 1px solid var(--danger); color: white;
            padding: 5px 10px; cursor: pointer; font-size: 0.8rem; margin-bottom: 10px;
        }

        .hidden { display: none !important; }
        .start-gear { font-size: clamp(4rem, 15vw, 8rem); color: var(--bronze); opacity: 0.3; animation: spin 10s linear infinite; margin-bottom: 10px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 手機直屏特殊優化 */
        @media (max-width: 600px) {
            #main-container { padding: 15px; min-height: 95vh; }
            .keyboard { gap: 2px; }
            .rank-item { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="main-container">
        <button id="fullscreen-btn" onclick="toggleFullScreen()">⛶ FULLSCREEN</button>

        <div id="screen-start" style="text-align: center;">
            <div class="start-gear">⚙️</div>
            <h1>LOGOS FORGE</h1>
            <p style="color: var(--bronze); margin-bottom: 20px; font-size: 0.9rem;">— STEAM POWERED SYNC ENGINE —</p>
            <button class="btn-action" onclick="enterLobby()">啟動核心系統 (INITIALIZE)</button>
        </div>

        <div id="screen-login" class="hidden">
            <h1>⚙️ 大廳管理 ⚙️</h1>
            <div style="text-align:center; margin-bottom:10px;">
                <input type="text" id="p-name" readonly placeholder="IDENT-ID" 
                       style="background:#000; border:2px solid var(--bronze); color:var(--gold); padding:8px; font-size:1.5rem; width:90%; text-align:center;">
            </div>
            
            <div class="keyboard" id="kb-container"></div>

            <p style="text-align:center; color:var(--bronze); margin: 5px 0; font-size: 0.8rem;">壓力輸出等級 (DIFFICULTY)</p>
            <div style="display:flex; flex-wrap: wrap; justify-content:center; gap:5px; margin-bottom:15px;">
                <button class="diff-btn" onclick="setDiff(3, this)">低壓(3)</button>
                <button class="diff-btn active" id="def-diff" onclick="setDiff(4, this)">常壓(4)</button>
                <button class="diff-btn" onclick="setDiff(5, this)">高壓(5)</button>
                <button class="diff-btn" onclick="setDiff(6, this)">超壓(6)</button>
            </div>

            <button class="btn-action" onclick="startGame()">同步程序啟動 (START)</button>
            <div class="rank-container" id="lobby-rank"></div>
        </div>

        <div id="screen-game" class="hidden">
            <button class="btn-back" onclick="quitGame()">◀ 返回大廳</button>
            <div style="display: flex; justify-content: space-between; border-bottom: 2px solid var(--bronze); padding-bottom: 5px; margin-bottom: 10px; align-items: center;">
                <div id="timer" style="font-family: 'Special Elite'; font-size: 1.8rem; color: var(--steam-blue);">0.00s</div>
                <div style="text-align:right; font-size: 0.8rem;">
                    <span id="user-tag" style="color:var(--gold)"></span><br>
                    <span id="lvl-tag" style="color:var(--bronze)">LVL: 1/10</span>
                </div>
            </div>
            <div id="drop-zone" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; min-height:180px; align-items:center;"></div>
            <button class="btn-action" onclick="verifyLogic()">文字同步 (SYNC)</button>
        </div>

        <div id="screen-end" class="hidden">
            <h1 style="color:var(--steam-blue)">校準完成！</h1>
            <p id="final-stat" style="text-align:center; font-size:1.5rem; color:var(--gold); margin-bottom: 10px;"></p>
            <div class="rank-container" id="end-rank"></div>
            <button class="btn-action" style="margin-top:20px;" onclick="location.reload()">重新啟動核心</button>
        </div>
    </div>

    <audio id="lobby-bgm" loop src="lobby.mp3"></audio>
    <audio id="game-bgm" loop src="bgm.mp3"></audio>

    <script src="data.js"></script>
    <script>
        let diff = 4;
        let step = 0;
        let quests = [];
        let timerStart, timerInterval;
        let sortableInstance = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const lobbyBgm = document.getElementById('lobby-bgm');
        const gameBgm = document.getElementById('game-bgm');

        // --- 全螢幕功能 ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`無法啟動全螢幕模式: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function playSfx(win) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = win ? 'triangle' : 'sawtooth';
            osc.frequency.setValueAtTime(win ? 220 : 110, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function initSortable() {
            if (!sortableInstance) {
                const zone = document.getElementById('drop-zone');
                sortableInstance = new Sortable(zone, {
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    delay: 0, 
                    touchStartThreshold: 5 
                });
            }
        }

        function enterLobby() {
            playSfx(true);
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-login').classList.remove('hidden');
            lobbyBgm.volume = 0.4;
            lobbyBgm.play().catch(() => {});
            updateLeaderboardUI(diff);
        }

        function setDiff(v, el) {
            playSfx(true);
            diff = v;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateLeaderboardUI(diff);
        }

        const keys = "QWERTYUIOPASDFGHJKLZXCVBNM".split("");
        const kb = document.getElementById('kb-container');
        keys.forEach(k => {
            const b = document.createElement('div');
            b.className = 'key'; b.innerText = k;
            b.onclick = () => { playSfx(true); document.getElementById('p-name').value += k; };
            kb.appendChild(b);
        });
        const del = document.createElement('div');
        del.className = 'key wide'; del.innerText = "DEL";
        del.onclick = () => { let v = document.getElementById('p-name').value; document.getElementById('p-name').value = v.slice(0,-1); };
        kb.appendChild(del);

        function startGame() {
            const name = document.getElementById('p-name').value;
            if(!name) return alert("請輸入煉金師代號！");
            
            lobbyBgm.pause();
            gameBgm.volume = 0.3;
            gameBgm.currentTime = 0;
            gameBgm.play().catch(() => {});

            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            document.getElementById('user-tag').innerText = "ID: " + name;

            initSortable();

            step = 0;
            quests = idiomData.sort(() => 0.5 - Math.random()).slice(0, 10);
            timerStart = Date.now();
            timerInterval = setInterval(() => {
                document.getElementById('timer').innerText = ((Date.now()-timerStart)/1000).toFixed(2) + "s";
            }, 50);
            loadNext();
        }

        function loadNext() {
            const zone = document.getElementById('drop-zone');
            zone.innerHTML = '';
            const raw = quests[step];
            document.getElementById('lvl-tag').innerText = `CORE: ${step + 1}/10 (LV.${diff})`;

            let len = Math.max(1, Math.floor(raw.length / diff));
            let chunks = [];
            for(let i=0; i<diff; i++) {
                chunks.push(i === diff-1 ? raw.substring(i*len) : raw.substring(i*len, (i+1)*len));
            }
            chunks.sort(() => 0.5 - Math.random()).forEach(t => {
                const div = document.createElement('div');
                div.className = 'chip'; div.innerText = t;
                zone.appendChild(div);
            });
        }

        function verifyLogic() {
            const user = Array.from(document.querySelectorAll('.chip')).map(c => c.innerText).join('');
            if(user === quests[step]) {
                playSfx(true);
                step++;
                if(step < 10) loadNext(); else finishGame();
            } else {
                playSfx(false);
                document.body.style.backgroundColor = "#300";
                setTimeout(() => document.body.style.backgroundColor = "#0a0a0a", 200);
            }
        }

        function finishGame() {
            clearInterval(timerInterval);
            const finalTimeStr = document.getElementById('timer').innerText;
            const finalTimeVal = parseFloat(finalTimeStr.replace('s',''));
            const name = document.getElementById('p-name').value;
            
            const storageKey = `steam_rank_${diff}`;
            let list = JSON.parse(localStorage.getItem(storageKey) || "[]");
            list.push({name, time: finalTimeVal});
            list.sort((a,b) => a.time - b.time);
            localStorage.setItem(storageKey, JSON.stringify(list.slice(0, 10)));
            
            updateLeaderboardUI(diff);
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            const labels = {3:'低壓', 4:'常壓', 5:'高壓', 6:'超壓'};
            document.getElementById('final-stat').innerText = `${labels[diff]}耗時: ${finalTimeStr}`;
        }

        function quitGame() {
            if(confirm("確定放棄嗎？")) {
                clearInterval(timerInterval);
                gameBgm.pause();
                lobbyBgm.play();
                document.getElementById('screen-game').classList.add('hidden');
                document.getElementById('screen-login').classList.remove('hidden');
                updateLeaderboardUI(diff);
            }
        }

        function updateLeaderboardUI(targetDiff) {
            const list = JSON.parse(localStorage.getItem(`steam_rank_${targetDiff}`) || "[]");
            const labels = {3:'低壓', 4:'常壓', 5:'高壓', 6:'超壓'};
            ['lobby-rank', 'end-rank'].forEach(id => {
                const el = document.getElementById(id);
                if(!el) return;
                let html = `<div class="rank-title">🏅 ${labels[targetDiff]}排行榜 🏅</div>`;
                if(list.length === 0) html += `<div style="text-align:center;padding:10px;color:#555;">VOID</div>`;
                else list.slice(0, 5).forEach((item, idx) => {
                    html += `<div class="rank-item"><span>${idx+1}. ${item.name}</span><span class="rank-time">${item.time.toFixed(2)}s</span></div>`;
                });
                el.innerHTML = html;
            });
        }
    </script>
</body>
</html>
